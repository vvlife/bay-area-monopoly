#scene{width:100%;height:100%}

    {id:'p2',n:'电脑1',m:15000,pos:0,pr:[],jail:false,avatar:PLAYER_AVATARS[1],color:PLAYER_COLORS[1]},
    {id:'p3',n:'电脑2',m:15000,pos:0,pr:[],jail:false,avatar:PLAYER_AVATARS[2],color:PLAYER_COLORS[2]}
  ],cp:0,ph:'roll',pr:{},year:2025,turn:0};
  activeEffects=[];
  triggeredEvents=new Set();
  eventHistory=[];
  document.getElementById('lobby').style.display='none';
  document.getElementById('game').style.display='flex';
  init3D();
  uUI();
  updateGlobalEffects();
  updateYearDisplay();
}

function startMulti(){
  const n=document.getElementById('nm').value.trim()||'玩家';
  roomId=document.getElementById('room').value.trim()||'room1';
  connectWebSocket(n,roomId);
}

function connectWebSocket(name,room){
  const host=location.host;
  const proto=location.protocol==='https:'?'wss:':'ws:';
  
  document.getElementById('lobby').innerHTML='<p>连接中...</p>';
  
  try{
    ws=new WebSocket(proto+'//'+host);
    ws.onopen=()=>{
      reconnectAttempts=0;
      ws.send(JSON.stringify({type:'join',name:name,roomId:room}));
    };
    ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      handleServerMessage(m);
    };
    ws.onerror=()=>{toast('❌ 连接失败，3秒后重试...');scheduleReconnect(name,room);};
    ws.onclose=()=>{
      if(online){
        toast('⚠️ 断开连接，尝试重连...');
        scheduleReconnect(name,room);
      }
    };
  }catch(e){
    toast('❌ '+e.message);
    scheduleReconnect(name,room);
  }
}

function scheduleReconnect(name,room){
  if(reconnectTimer)clearTimeout(reconnectTimer);
  reconnectAttempts++;
  if(reconnectAttempts>5){
    toast('❌ 重连失败，请刷新页面');
    return;
  }
  reconnectTimer=setTimeout(()=>connectWebSocket(name,room),3000);
}

function handleServerMessage(m){
  if(m.type==='joined'){
    myId=m.playerId;
    online=true;
    toast('✅ 已加入房间 '+roomId);
  }else if(m.type==='state'){
    G=m;
    G.ps=G.players;
    G.cp=G.currentPlayer;
    activeEffects=m.activeEffects||[];
    eventHistory=m.eventHistory||[];
    triggeredEvents=new Set(m.triggeredEvents||[]);
    document.getElementById('lobby').style.display='none';
    document.getElementById('game').style.display='flex';
    if(!scn)init3D();
    uUI();
    updateGlobalEffects();
    updateEventHistory();
    updateYearDisplay();
  }else if(m.type==='event'){
    showEvent(m.event.title,m.event.desc);
    if(m.event.history){
      eventHistory=m.event.history;
      updateEventHistory();
    }
  }else if(m.type==='turn'){
    showTurnTip(m.playerName);
  }else if(m.type==='year'){
    G.year=m.year;
    updateYearDisplay();
    checkTimelineEvents();
  }else if(m.type==='effect'){
    activeEffects=m.effects;
    updateGlobalEffects();
  }else if(m.type==='reconnect'){
    toast('🔄 已恢复连接');
    myId=m.playerId;
  }else if(m.type==='rooms'){
    showRoomList(m.rooms);
  }
}

function showRoomList(rooms){
  const rl=document.getElementById('room-list');
  if(!rooms||rooms.length===0){
    rl.innerHTML='<p style="color:#888;font-size:12px">暂无房间</p>';
  }else{
    rl.innerHTML='<h3>可用房间</h3>'+rooms.map(r=>
      `<div class="room" onclick="joinRoom('${r.id}')">
        <div class="name">${r.id}</div>
        <div class="count">${r.players}/${r.maxPlayers} 人</div>
      </div>`
    ).join('');
  }
  rl.classList.add('show');
}

function joinRoom(id){
  document.getElementById('room').value=id;
  document.getElementById('room-list').classList.remove('show');
}

function init3D(){
  const cv=document.getElementById('scene');
  scn=new THREE.Scene();
  scn.background=new THREE.Color(0x0a0a12);
  cam=new THREE.PerspectiveCamera(45,cv.clientWidth/cv.clientHeight,0.1,1000);
  cam.position.set(0,18,18);
  cam.lookAt(0,0,0);
  ren=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  ren.setSize(cv.clientWidth,cv.clientHeight);
  ren.shadowMap.enabled=true;
  scn.add(new THREE.AmbientLight(0xffffff,0.7));
  const sl=new THREE.DirectionalLight(0xffffff,0.8);
  sl.position.set(10,20,10);
  sl.castShadow=true;
  scn.add(sl);
  const gr=new THREE.Mesh(new THREE.PlaneGeometry(30,30),new THREE.MeshStandardMaterial({color:0x1a3a1a}));
  gr.rotation.x=-Math.PI/2;
  gr.receiveShadow=true;
  scn.add(gr);
  
  T.forEach((t,i)=>{
    const p=gP(i);
    let cl=0x2a5a2a;
    if(t.g==='hk')cl=C.hk;else if(t.g==='sz')cl=C.sz;else if(t.g==='gz')cl=C.gz;else if(t.g==='zm')cl=C.zm;
    else if(t.type==='start')cl=C.start;else if(t.type==='jail')cl=C.jail;else if(t.type==='c'||t.type==='f')cl=C.chance;else if(t.type==='tax')cl=C.tax;
    const m=new THREE.Mesh(new THREE.BoxGeometry(TSZ-0.1,0.3,TSZ-0.1),new THREE.MeshStandardMaterial({color:cl}));
    m.position.set(p.x,0.15,p.z);
    m.castShadow=true;
    scn.add(m);
    ts.push(m);
  });
  
  const ct=new THREE.Mesh(new THREE.BoxGeometry(8,0.4,8),new THREE.MeshStandardMaterial({color:0x1a5c2e}));
  ct.position.set(0,0.2,0);
  scn.add(ct);
  
  G.ps.forEach((pl,pi)=>{
    const g=createPlayerModel(pl.color||PLAYER_COLORS[pi]);
    scn.add(g);
    mT(g,0,pi);
    tks.push(g);
  });
  
  setupCameraControls(cv);
  ani();
  window.onresize=()=>{cam.aspect=cv.clientWidth/cv.clientHeight;cam.updateProjectionMatrix();ren.setSize(cv.clientWidth,cv.clientHeight);};
}

function createPlayerModel(color){
  const g=new THREE.Group();
  const b=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.4,0.15,16),new THREE.MeshStandardMaterial({color:color}));
  b.position.y=0.08;g.add(b);
  const bd=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.35,0.6,16),new THREE.MeshStandardMaterial({color:color,emissive:color,emissiveIntensity:0.2}));
  bd.position.y=0.45;g.add(bd);
  const hd=new THREE.Mesh(new THREE.SphereGeometry(0.2,16,16),new THREE.MeshStandardMaterial({color:color}));
  hd.position.y=0.85;g.add(hd);
  g.castShadow=true;
  return g;
}

function setupCameraControls(cv){
  let dg=false,px=0,py=0,th=Math.PI/4,ph=Math.PI/4,rd=25;
  const uC=()=>{cam.position.set(rd*Math.sin(ph)*Math.cos(th),rd*Math.cos(ph),rd*Math.sin(ph)*Math.sin(th));cam.lookAt(0,0,0);};
  uC();
  cv.onmousedown=e=>{dg=true;px=e.clientX;py=e.clientY;};
  cv.onmousemove=e=>{if(!dg)return;th-=(e.clientX-px)*0.01;ph=Math.max(0.3,Math.min(1.3,ph+(e.clientY-py)*0.01));uC();px=e.clientX;py=e.clientY;};
  cv.onmouseup=()=>dg=false;
  cv.ontouchstart=e=>{dg=true;px=e.touches[0].clientX;py=e.touches[0].clientY;};
  cv.ontouchmove=e=>{if(!dg)return;th-=(e.touches[0].clientX-px)*0.005;ph=Math.max(0.3,Math.min(1.3,ph+(e.touches[0].clientY-py)*0.005));uC();px=e.touches[0].clientX;py=e.touches[0].clientY;};
  cv.ontouchend=()=>dg=false;
  cv.onwheel=e=>{rd=Math.max(12,Math.min(35,rd+e.deltaY*0.03));uC();};
}

function gP(i){
  const of=BS/2-TSZ/2;
  if(i<10)return{x:of-i*TSZ,z:of};
  if(i<20)return{x:-of,z:of-(i-10)*TSZ};
  if(i<30)return{x:-of+(i-20)*TSZ,z:-of};
  return{x:of,z:-of+(i-30)*TSZ};
}

function mT(tk,i,pi){
  const p=gP(i);
  const offset=pi===0?-0.3:pi===1?0.3:pi===2?-0.15:0.15;
  const zOff=pi===2?0.2:pi===3?-0.2:0;
  tk.position.set(p.x+offset,0.5,p.z+zOff);
}

function ani(){requestAnimationFrame(ani);ren.render(scn,cam);}

function uUI(){
  document.getElementById('st').innerHTML=G.ps.map((p,i)=>`<div class="pcard ${i===G.cp?'on':''}"><span class="avatar" style="background:${intToHex(p.color||PLAYER_COLORS[i])}">${p.avatar||PLAYER_AVATARS[i]}</span><div><div>${p.n}</div><span class="m">$${p.m.toLocaleString()}</span></div></div>`).join('');
  document.getElementById('il').innerHTML=G.ps.map((p,i)=>`<div class="pi ${i===G.cp?'on':''}"><span class="avatar" style="background:${intToHex(p.color||PLAYER_COLORS[i])}">${p.avatar||PLAYER_AVATARS[i]}</span><div><div class="n">${p.n} ${i===G.cp?'◀':''}</div><div class="m">$${p.m.toLocaleString()}</div></div></div>`).join('');
  document.getElementById('br').disabled=G.ph!=='roll';
  document.getElementById('bb').style.display=G.ph==='buy'?'inline':'none';
  document.getElementById('bs').style.display=G.ph==='buy'?'inline':'none';
  
  // 显示当前回合提示
  if(G.ph==='roll'&&G.ps[G.cp]){
    showTurnTip(G.ps[G.cp].n);
  }
}

function intToHex(c){return'#'+c.toString(16).padStart(6,'0');}

function showTurnTip(name){
  const tt=document.getElementById('turn-tip');
  document.getElementById('tt-text').textContent=`🎯 ${name} 的回合`;
  tt.classList.add('show');
  setTimeout(()=>tt.classList.remove('show'),2000);
}

function updateYearDisplay(){
  document.getElementById('year-display').textContent=`📅 ${G.year}年`;
}

function updateEventHistory(){
  const list=document.getElementById('eh-list');
  document.getElementById('eh-count').textContent=eventHistory.length;
  list.innerHTML=eventHistory.slice(-20).reverse().map(e=>`<div class="item"><span class="year">${e.year}年</span> <span class="type-${e.type}">${TYPE_ICONS[e.type]}${e.name}</span></div>`).join('');
}

function updateGlobalEffects(){
  const ge=document.getElementById('global-effects');
  if(activeEffects.length===0){
    ge.classList.remove('show');
    return;
  }
  ge.classList.add('show');
  document.getElementById('ge-list').innerHTML=activeEffects.map(e=>
    `<div class="effect active">${TYPE_ICONS[e.type]} ${e.name} (${e.remaining}回合)</div>`
  ).join('');
}

// V1.2: 检查时间线事件
function checkTimelineEvents(){
  const year=G.year;
  TIMELINE_EVENTS.forEach(ev=>{
    if(ev.year===year&&!triggeredEvents.has(ev.year+'-'+ev.name)){
      triggeredEvents.add(ev.year+'-'+ev.name);
      activeEffects.push({...ev,remaining:ev.duration});
      eventHistory.push({year:ev.year,type:ev.type,name:ev.name,desc:ev.desc});
      showEvent(TYPE_ICONS[ev.type]+' '+ev.name,ev.desc);
      updateEventHistory();
      updateGlobalEffects();
    }
  });
}

// V1.2: 应用全局效果
function applyEffects(type,value){
  let result=value;
  activeEffects.forEach(ef=>{
    if(ef.effect[type]!==undefined){
      if(typeof ef.effect[type]==='number'){
        if(type==='buyCost'||type==='rentMultiplier'||type==='inflation'||type==='taxReduce'){
          result*=ef.effect[type];
        }else{
          result+=ef.effect[type];
        }
      }
    }
  });
  return Math.floor(result);
}

function roll(){
  if(online && G.ps[G.cp].id!==myId){toast('⚠️ 不是你的回合');return;}
  
  // V1.2: 应用骰子效果
  let d1=Math.floor(Math.random()*6)+1,d2=Math.floor(Math.random()*6)+1;
  const minDice=activeEffects.reduce((m,ef)=>Math.max(m,ef.effect.minDice||1),1);
  d1=Math.max(d1,minDice);
  d2=Math.max(d2,minDice);
  
  document.getElementById('d1').classList.add('ani');document.getElementById('d2').classList.add('ani');
  document.getElementById('d1').textContent=D[d1-1];document.getElementById('d2').textContent=D[d2-1];
  setTimeout(()=>{
    document.getElementById('d1').classList.remove('ani');document.getElementById('d2').classList.remove('ani');
    let total=d1+d2;
    
    // V1.2: 额外移动
    const extraMove=activeEffects.reduce((s,ef)=>s+(ef.effect.extraMove||0),0);
    total+=extraMove;
    
    mv(G.cp,total);
  },600);
}

function mv(pi,st){
  const pl=G.ps[pi];
  if(pl.jail){
    const d1=Math.floor(Math.random()*6)+1,d2=Math.floor(Math.random()*6)+1;
    if(d1===d2){
      pl.jail=false;
      toast('🎯 双数！出狱');
    }else{
      toast('🔒 在狱中');
      endT();return;
    }
  }
  const op=pl.pos;
  pl.pos=(pl.pos+st)%40;
  
  // V1.2: 经过起点的额外奖励
  const startBonus=activeEffects.reduce((s,ef)=>s+(ef.effect.startBonus||0),2000);
  if(pl.pos<op){pl.m+=startBonus;toast(`🔴 经过起点 +$${startBonus}`);}
  
  let c=op;
  const iv=setInterval(()=>{
    c=(c+1)%40;
    mT(tks[pi],c,pi);
    if(c===pl.pos){clearInterval(iv);hL(pi);}
  },120);
}

function hL(pi){
  const pl=G.ps[pi],t=T[pl.pos];
  
  // 事件卡
  if(t.type==='c'){
    const ev=EVENTS.chance[Math.floor(Math.random()*EVENTS.chance.length)];
    // V1.2: 检查是否被禁用
    const disabled=activeEffects.some(ef=>ef.effect.disableChance&&ef.effect.disableChance.includes(ev.n));
    if(disabled){
      showEvent('❓ 机会',`${ev.n} - 当前政策下失效`);
    }else{
      showEvent('❓ '+ev.n, ev.eff(G));
    }
    endT();return;
  }
  if(t.type==='f'){
    const ev=EVENTS.fate[Math.floor(Math.random()*EVENTS.fate.length)];
    showEvent('🎴 '+ev.n, ev.eff(G));
    endT();return;
  }
  
  // 地产/交通
  if((t.type==='p'||t.type==='s')&&!G.pr[pl.pos]&&pl.m>=applyEffects('buyCost',t.p)){
    G.ph='buy';
    const price=applyEffects('buyCost',t.p);
    md(`🏙️ ${t.c||''} ${t.n}`,`价格: $${price}`,`租金: $${t.r}`);
    uUI();return;
  }
  else if((t.type==='p'||t.type==='s')&&G.pr[pl.pos]&&G.pr[pl.pos].o!==pl.id){
    const ow=G.ps.find(p=>p.id===G.pr[pl.pos].o);
    let rn=t.r*(1+(G.pr[pl.pos].h||0)*0.5);
    
    // V1.2: 应用租金效果
    const rentBonus=activeEffects.reduce((rb,ef)=>{
      if(ef.effect.rentBonus){
        if(ef.effect.rentBonus[t.g])rb*=ef.effect.rentBonus[t.g];
        if(ef.effect.rentBonus.global)rb*=ef.effect.rentBonus.global;
      }
      return rb;
    },1);
    rn=applyEffects('rentMultiplier',rn*rentBonus);
    
    pl.m-=rn;ow.m+=rn;
    toast(`💸 支付租金 $${Math.floor(rn)}`);
    
    // V1.2: 交通格额外奖励
    if(t.type==='s'){
      const stationBonus=activeEffects.reduce((s,ef)=>s+(ef.effect.stationBonus||0),0);
      if(stationBonus>0){
        ow.m+=stationBonus;
        toast(`🚗 交通奖励 +$${stationBonus}`);
      }
    }
  }
  else if(t.type==='tax'){
    // V1.2: 应用税收减免
    let tax=t.tx;
    const taxReduce=activeEffects.reduce((r,ef)=>Math.min(r,ef.effect.taxReduce||1),1);
    tax=Math.floor(tax*taxReduce);
    // V1.2: 额外税收
    const extraTax=activeEffects.reduce((s,ef)=>s+(ef.effect.extraTax||0),0);
    tax+=extraTax;
    pl.m-=tax;
    toast(`💰 缴税 -$${tax}`);
  }
  else if(t.type==='go'){pl.pos=10;pl.jail=true;toast('🚔 入狱！');}
  else if(t.type==='free'){toast('🅿️ 免费停车');}
  
  endT();
}

function showEvent(title,desc){
  document.getElementById('ev-title').textContent=title;
  document.getElementById('ev-desc').textContent=desc;
  document.getElementById('event-box').classList.add('show');
}

function closeEvent(){
  document.getElementById('event-box').classList.remove('show');
}

function buy(){
  const pl=G.ps[G.cp],t=T[pl.pos];
  const price=applyEffects('buyCost',t.p);
  pl.m-=price;G.pr[pl.pos]={o:pl.id,h:0};pl.pr.push(pl.pos);
  ts[pl.pos].material.emissive=new THREE.Color(pl.color||PLAYER_COLORS[G.cp]);
  ts[pl.pos].material.emissiveIntensity=0.4;
  const h=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.4,0.3),new THREE.MeshStandardMaterial({color:pl.color||PLAYER_COLORS[G.cp],emissive:pl.color||PLAYER_COLORS[G.cp],emissiveIntensity:0.3}));
  const p=gP(pl.pos);h.position.set(p.x+0.3,0.5,p.z+0.3);scn.add(h);
  cM();toast(`🏆 购买 ${t.n}`);endT();
}

function skip(){cM();endT();}

function endT(){
  G.ph='roll';
  G.turn++;
  
  // V1.2: 每年的回合数后更新年份
  if(G.turn%10===0){
    G.year++;
    updateYearDisplay();
    checkTimelineEvents();
  }
  
  // V1.2: 减少效果持续时间
  activeEffects=activeEffects.filter(ef=>{
    ef.remaining--;
    return ef.remaining>0;
  });
  updateGlobalEffects();
  
  if(!online){
    // 电脑玩家AI
    G.cp=(G.cp+1)%G.ps.length;
    if(G.cp!==0){
      uUI();
      setTimeout(()=>{
        if(G.ps[G.cp].jail){
          const d1=Math.floor(Math.random()*6)+1;
          if(d1===Math.floor(Math.random()*6)+1){
            G.ps[G.cp].jail=false;toast(`${PLAYER_AVATARS[G.cp]} 出狱`);
          }else{
            toast(`🔒 ${G.ps[G.cp].n}在狱中`);
            endT();return;
          }
        }
        const d1=Math.floor(Math.random()*6)+1,d2=Math.floor(Math.random()*6)+1;
        document.getElementById('d1').textContent=D[d1-1];document.getElementById('d2').textContent=D[d2-1];
        const cpu=G.ps[G.cp];
        cpu.pos=(cpu.pos+d1+d2)%40;
        mT(tks[G.cp],cpu.pos,G.cp);
        const t=T[cpu.pos];
        if((t.type==='p'||t.type==='s')&&!G.pr[cpu.pos]&&cpu.m>=t.p){
          cpu.m-=t.p;G.pr[cpu.pos]={o:cpu.id,h:0};cpu.pr.push(cpu.pos);
          ts[cpu.pos].material.emissive=new THREE.Color(cpu.color||PLAYER_COLORS[G.cp]);
          ts[cpu.pos].material.emissiveIntensity=0.4;
          toast(`${PLAYER_AVATARS[G.cp]} 购买 ${t.n}`);
        }
        if(t.type==='c'||t.type==='f'){
          const evs=t.type==='c'?EVENTS.chance:EVENTS.fate;
          const ev=evs[Math.floor(Math.random()*evs.length)];
          toast(`${PLAYER_AVATARS[G.cp]}: ${ev.n}`);
          ev.eff(G);
        }
        endT();
      },1000);
    }else{
      uUI();
    }
  }else{
    ws.send(JSON.stringify({type:'endTurn'}));
    uUI();
  }
}

function md(t,p,r){
  document.getElementById('mb').innerHTML=`<h2>${t}</h2><p>${p}</p><p>${r}</p><div style="margin-top:14px"><button class="btn2 b2" onclick="buy()">💰 购买</button><button class="btn2 b3" onclick="skip()">跳过</button></div>`;
  document.getElementById('modal').classList.add('show');
}

function cM(){document.getElementById('modal').classList.remove('show');}

function toast(m){
  const e=document.querySelector('.tst')||document.createElement('div');
  e.className='tst';
  e.style.cssText='position:fixed;top:55px;left:50%;transform:translateX(-50%);background:#ffd700;color:#000;padding:6px 14px;border-radius:6px;font-size:11px;z-index:500;max-width:90%;text-align:center';
  e.textContent=m;
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),2500);
}
</script>
</body>
